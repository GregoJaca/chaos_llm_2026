paths:
  input_dir: outputs_microsoft #  outputs_microsoft # outputs_OLD  # folder with run_* outputs
  # input_dir: outputs_0.0001 #  outputs_microsoft # outputs_OLD  # folder with run_* outputs
  output_dir: analysis_outputs_microsoft # analysis_outputs_microsoft # analysis_OLD # analysis_outputs_microsoft  # where analysis artifacts go
  # output_dir: analysis_0.0001 # analysis_outputs_microsoft # analysis_OLD # analysis_outputs_microsoft  # where analysis artifacts go
  run_list: null  # list of run folder names or absolute paths

prompt_filter:
  include: null  # list of prompt names to include
  exclude: null  # list of prompt names to exclude

divergence:
  any_pair: true  # first index where any tokens differ across sequences
  baseline_per_sequence: false  # divergence per sequence vs baseline
  pairwise: true  # divergence for every pair of sequences
  pairwise_max_pairs: null  # limit number of pairs (deterministic order)
  exclude_baseline: true  # ignore baseline for any baseline-dependent metrics
  include_baseline_in_any_pair: false  # include baseline in any_pair set
  index_reference: generated  # generated | absolute
  no_divergence_value: -1  # value when no divergence found
  exclude_no_divergence_from_plots: false  # drop -1 values in plots
  primary_metric: pairwise  # any_pair | baseline_per_sequence | pairwise
  stable_divergence_value: .inf  # auto | number | null
  exclude_prompt: true  # if true, divergence index is relative to generation start

summary:
  quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]  # quantiles to report

plots:
  enabled: true  # master toggle
  formats: [png]  # add pdf later if needed
  dpi: 300  # figure dpi
  show_title: false  # whether to draw plot titles
  font_size: 14
  title_size: 14
  label_size: 14
  tick_size: 12
  legend_size: 11
  bins: 100  # histogram bins
  histograms:
    enabled: false
    per_run: false  # per run histograms
    per_prompt: false  # aggregated per prompt histograms
  title_prefix: "Divergence"  # plot title prefix
  grid: false  # background grid
  color_map: tab10  # reserved for future multi-series plots
  xlim: null  # example: [0, 2000]
  ylim: null
  label_no_divergence: "no divergence"
  dependencies:
    enabled: true  # generate parameter-dependence plots
    metrics: [harmonic_mean, geometric_mean]  # which metrics to plot
    error_bars: none  # std | var | fan | none
    fan_quantiles: [0.1, 0.25, 0.75, 0.9] # quantiles for the fan plot
    x_scale: [log] # linear | log
    y_scale: [linear]
    per_prompt: false  # separate plot per prompt
    x_axis: [attention]  # which x-axes to generate
    inverse: false  # if true, also plot 1/divergence (stability -> 0)
    plot_separate_magnitude: true  # separate plot per magnitude
    split_y_for_stable: true  # use discontinuous/split y-axis for stable points
    include_stable_in_stats: false  # include stable sequences in aggregation stats

survival:
  enabled: false
  plot_individual: false
  plot_together: true
  yscale: linear  # linear | log
  xscale: log  # linear | log

agreement:
  enabled: false
  baseline: false
  all_pairs: true
  max_steps: null
  yscale: log   # linear | log
  xscale: linear  # linear | log

logits:
  enabled: false
  filename: logits_metrics.npz
  max_steps: null
  yscale: linear   # linear | log
  xscale: linear  # linear | log

performance:
  mmap_mode: r  # memory-map mode for loading npz
