paths:
  input_dir: results
  output_dir: analysis_outputs
  run_list: null  # list of run folder names or absolute paths

prompt_filter:
  include: null  # list of prompt names to include
  exclude: null  # list of prompt names to exclude

divergence:
  any_pair: true
  baseline_per_sequence: true
  include_baseline_in_any_pair: false
  index_reference: generated  # generated | absolute
  no_divergence_value: -1
  exclude_no_divergence_from_plots: true
  primary_metric: baseline_per_sequence  # any_pair | baseline_per_sequence

summary:
  quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]

plots:
  enabled: true
  formats: [png]  # add pdf later if needed
  dpi: 300
  bins: 60
  per_run: true
  per_prompt: true
  title_prefix: "Divergence"
  grid: false
  color_map: tab10
  xlim: null  # example: [0, 2000]
  ylim: null
  label_no_divergence: "no divergence"

performance:
  mmap_mode: r
