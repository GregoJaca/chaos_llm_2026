project:
  seed: 42
  device: auto  # auto | cuda | cpu
  dtype: float16  # float16 | bfloat16 | float32 (int8/int4 require quantization libs)

paths:
  model_path: ../models--deepseek-ai--DeepSeek-R1-Distill-Qwen-1.5B
  prompts_path: prompts.txt
  output_dir: outputs

prompts:
  format: line
  encoding: utf-8

perturbation:
  num_conditions: 4
  magnitude_list: [0.0004]
  apply_to_first_n_tokens: null  # set an int to restrict perturbations to first N tokens
  subspace_mode: random  # random | first
  subspace_seed: 42

attention:
  sliding_window_list: [4096]
  use_sliding_window: true

generation:
  max_new_tokens: 2000
  adaptive_stop: false
  do_sample: false
  temperature: 0.0
  top_k: 1
  top_p: 1.0
  num_beams: 1

output:
  pad_token_id: -1
  save_text: false
