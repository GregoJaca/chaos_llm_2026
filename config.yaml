project:
  seed: 69  # RNG seed (included in run folder name)
  device: auto  # auto | cuda | cpu
  dtype: bfloat16  # float16 | bfloat16 | float32 (int8/int4 require quantization libs)

paths:
  # model_path: ../models--deepseek-ai--DeepSeek-R1-Distill-Qwen-1.5B  # model or HF cache path
  model_path: "microsoft/Phi-4-mini-instruct"
  prompts_path: prompts.txt  # prompt file
  output_dir: outputs_microsoft  # run output root

prompts:
  format: line  # one prompt per line
  encoding: utf-8

perturbation:
  num_conditions: 200  # number of equidistant initial conditions
  magnitude_list: [0.0001]  # perturbation magnitudes
  apply_to_first_n_tokens: null  # set an int to restrict perturbations to first N tokens
  subspace_mode: random  # random | first
  subspace_seed: 69  # RNG seed for subspace selection

attention:
  # sliding_window_list: [30, 50, 65]  # XXX for 0.0003
  sliding_window_list: [5, 10, 20, 35, 50, 65, 80, 150, 1000]  # attention window sizes
  sliding_window_list: [3, 7, 75,]  # attention window sizes
  # sliding_window_list: [10, 50, 100, 200, 500, 1000]  # attention window sizes
  use_sliding_window: true 

generation:
  max_new_tokens: 500 # 1000  # max generated tokens
  batch_size: 36  # batched generation size
  adaptive_stop: false  # stop at divergence vs baseline
  do_sample: false  # greedy decoding
  temperature: 0.0  # ignored for greedy
  top_k: 1  # ignored for greedy
  top_p: 1.0  # ignored for greedy
  num_beams: 1  # keep greedy

output:
  pad_token_id: -1  # padding for variable-length storage
  save_text: true  # save decoded text outputs to JSON
  include_prompt_tokens: true  # include prompt tokens in saved sequences
  text_filename: texts.json  # name of text output file per run
  text_skip_special_tokens: true  # skip special tokens in decoding
  text_clean_up_spaces: true  # clean up spaces in decoded text

logits:
  enabled: false  # compute logit divergence vs baseline
  top_k: 5  # top-k logits to compare (baseline support)
  methods: [cos_dist] # [kl_divergence, js_divergence, cos_dist]  # metrics to compute
  max_steps: null  # limit logit steps (null = use max_new_tokens)
  filename: logits_metrics.npz  # output filename per run
