project:
  seed: 42  # RNG seed
  device: auto  # auto | cuda | cpu
  dtype: float16  # float16 | bfloat16 | float32 (int8/int4 require quantization libs)

paths:
  model_path: ../models--deepseek-ai--DeepSeek-R1-Distill-Qwen-1.5B  # model or HF cache path
  prompts_path: prompts.txt  # prompt file
  output_dir: outputs  # run output root

prompts:
  format: line  # one prompt per line
  encoding: utf-8

perturbation:
  num_conditions: 100  # number of equidistant initial conditions
  magnitude_list: [0.0003, 0.0002]  # perturbation magnitudes
  apply_to_first_n_tokens: null  # set an int to restrict perturbations to first N tokens
  subspace_mode: random  # random | first
  subspace_seed: 42  # RNG seed for subspace selection

attention:
  sliding_window_list: [4096]  # attention window sizes
  use_sliding_window: true  # toggle sliding window behavior

generation:
  max_new_tokens: 2000  # max generated tokens
  adaptive_stop: false  # stop at divergence vs baseline
  do_sample: false  # greedy decoding
  temperature: 0.0  # ignored for greedy
  top_k: 1  # ignored for greedy
  top_p: 1.0  # ignored for greedy
  num_beams: 1  # keep greedy

output:
  pad_token_id: -1  # padding for variable-length storage
  save_text: true  # save decoded text outputs to JSON
  include_prompt_tokens: true  # include prompt tokens in saved sequences
  text_filename: texts.json  # name of text output file per run
  text_skip_special_tokens: true  # skip special tokens in decoding
  text_clean_up_spaces: true  # clean up spaces in decoded text
